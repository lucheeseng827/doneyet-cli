name: Release dyt

# Publish prebuilt `dyt` binaries when a version tag is pushed, e.g. v0.1.0.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGE="dyt-${VERSION}-${TARGET}"
          mkdir "$STAGE"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${TARGET}/release/dyt.exe" "$STAGE/"
          else
            cp "target/${TARGET}/release/dyt" "$STAGE/"
          fi
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${STAGE}.zip" "$STAGE"
            echo "asset=${STAGE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${STAGE}.tar.gz" "$STAGE"
            echo "asset=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: ${{ steps.pkg.outputs.asset }}
